---
- name: Manage firewalld rules for offline systems
  hosts: 127.0.0.1
  connection: local
  become: true

  tasks:

    - name: Ensure firewalld starts on boot and is running
      ansible.builtin.service:
        name: firewalld
        state: started
        enabled: yes

    - name: Set the default zone to "drop" so all traffic is dropped by default
      ansible.builtin.command: "firewall-cmd --set-default-zone=drop"

    - name: Create a new zone for local ethernet on 192.168.1.0/24
      ansible.builtin.command: "firewall-cmd --permanent --new-zone=vxnet"

    - name: Accept all traffic in the vxnet zone
      ansible.builtin.command: "firewall-cmd --permanent --zone=vxnet --set-target=ACCEPT"

    - name: Add the 192.168.1.0/24 range to the vxnet zone
      ansible.builtin.command: "firewall-cmd --permanent --zone=vxnet --add-source=192.168.1.0/24"

    - name: Add the loopback interface to the trusted zone
      ansible.builtin.command: "firewall-cmd --permanent --zone=trusted --add-interface=lo"

    - name: Reload to save and apply changes
      ansible.builtin.command: "firewall-cmd --reload"

